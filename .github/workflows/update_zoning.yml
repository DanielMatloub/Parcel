name: Update SF Zoning Data

on:
  schedule:
    - cron: '0 6 1 * *'  # 6am on the 1st of every month
  workflow_dispatch:  # allows manual trigger from GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install geopandas sqlalchemy psycopg2-binary geoalchemy2

      - name: Download latest SF zoning data
        run: |
          curl -L "https://data.sfgov.org/api/geospatial/3i4a-hu95?method=export&fileType=geojson&type=GeoJSON" -o sf_zoning.geojson
          echo "Downloaded $(wc -c < sf_zoning.geojson) bytes"

      - name: Update database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python3 - <<'EOF'
          import geopandas as gpd
          import os
          from sqlalchemy import create_engine, text

          db_url = os.getenv("DATABASE_URL").replace("postgres://", "postgresql://")
          engine = create_engine(db_url)

          print("Reading GeoJSON...")
          gdf = gpd.read_file("sf_zoning.geojson")
          gdf = gdf.to_crs(epsg=4326)

          print("Writing to database...")
          gdf.to_postgis("zoning_districts", engine, if_exists="replace", index=False)

          print("Clearing interpretation cache...")
          with engine.connect() as conn:
              conn.execute(text("DELETE FROM zone_cache"))
              conn.commit()

          print(f"Done! {len(gdf)} districts updated.")
          EOF

      - name: Recreate spatial index
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python3 - <<'EOF'
          import sqlalchemy
          from sqlalchemy import create_engine, text
          import os

          db_url = os.getenv("DATABASE_URL").replace("postgres://", "postgresql://")
          engine = create_engine(db_url)

          with engine.connect() as conn:
              conn.execute(text("""
                  CREATE INDEX IF NOT EXISTS zoning_districts_geometry_idx
                  ON zoning_districts USING GIST (geometry)
              """))
              conn.commit()
          print("Spatial index recreated.")
          EOF